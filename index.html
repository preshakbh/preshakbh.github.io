<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preshak Bhattarai - Portfolio</title>

  <style>
    /* ===== BASIC COLORS ===== */
    :root{
      --blue: #004182;
      --bg: #f3f5f8;
      --card: #ffffff;
      --text: #111827;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: var(--bg); /* background property */
      color: var(--text); /* color property */
    }

    /* ===== HEADER ===== */
    .header {
      background-color: var(--blue);
      color: white;
      padding: 20px;
      overflow: auto; /* helps with float */
    }

    /* FLOAT PROPERTY USED HERE */
    .profile-link {
      float: right; /* REQUIRED: moves image to right */
      margin-left: 15px;
    }

    .profile-pic{
      width: 120px;
      height: 120px;
      border-radius: 10px;
    }

    h1 {
      margin: 0;
    }

    /* ===== PSEUDO-ELEMENT ===== */
    h2::after {
      content: ""; /* REQUIRED pseudo-element */
      display: block;
      width: 40px;
      height: 3px;
      background-color: var(--blue);
      margin-top: 5px;
    }

    /* ===== LINKS ===== */
    a {
      color: var(--blue);
      text-decoration: none;
    }

    /* HOVER PSEUDO-CLASS */
    a:hover {
      color: red; /* REQUIRED hover color change */
    }

    /* ===== CONTENT ===== */
    .container {
      padding: 20px;
    }

    .card {
      background: var(--card);
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    /* ===== TABLE ===== */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid black;
      padding: 8px;
    }

    /* NTH-CHILD SELECTOR */
    tr:nth-child(even) {
      background-color: #e8f1ff; /* REQUIRED */
    }

    tr:nth-child(odd) {
      background-color: #ffffff; /* REQUIRED */
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <a class="profile-link" href="#">
      <img class="profile-pic" src="https://i.ibb.co/1G38ckT0/IMG-20260302-000632-547.webp" />
    </a>

    <h1>Preshak Bhattarai</h1>
    <p>Cybersecurity Student</p>
  </div>

  <!-- MAIN CONTENT -->
  <div class="container">

    <div class="card">
      <h2>Contact</h2>
      <p>Email: <a href="mailto:preshak07@gmail.com">preshak07@gmail.com</a></p>
      <p>Location: Green Bay, WI</p>
    </div>

    <div class="card">
      <h2>Skills</h2>
      <ul>
        <li>Python</li>
        <li>Java</li>
        <li>SQL</li>
        <li>Linux</li>
      </ul>
    </div>

    <div class="card">
      <h2>Experience</h2>
      <p>Research Assistant - UW Green Bay</p>
    </div>

    <div class="card">
      <h2>Experience Table</h2>
      <table>
        <tr>
          <th>Role</th>
          <th>Year</th>
        </tr>
        <tr>
          <td>Research Assistant</td>
          <td>2026</td>
        </tr>
        <tr>
          <td>Intern</td>
          <td>2024</td>
        </tr>
      </table>
    </div>

  </div>

</body>
</html>
